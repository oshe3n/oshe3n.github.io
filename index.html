<!DOCTYPE html>
<html>
  <head>
    <title>Sticky Notes</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://statics.teams.microsoft.com/sdk/v1.11.0/js/MicrosoftTeams.min.js"></script>
  </head>
  <style>
    body {
      background-color: #f3f2f1;
    }

    .container {
      margin-top: 40px;
    }

    .sticky-note {
      border: 1px solid #e0e0e0;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 5px;
      background-color: #ffffff;
      box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.1);
      font-size: 16px;
    }

    .sticky-note h4 {
      margin-top: 0;
      color: #6264a7;
    }

    #stickyForm {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.1);
    }

    #stickyForm label {
      font-size: 18px;
      font-weight: 500;
      color: #6264a7;
    }

    #stickyForm button {
      background-color: #6264a7;
      border: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    #stickyMobileSync button {
      background-color: #6264a7;
      border: none;
      color: #ffffff;
      font-size: 16px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    #stickyForm button:hover {
      background-color: #4e4f91;
    }

    .btnSticky {
      color: #6264a7;
      font-size: 1.7rem;
      padding: 0px 5px;
    }

    .notification {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      background-color: #4e4f91;
      color: #fff;
      text-align: center;
      padding: 10px;
      display: none; /* Initially hide the notification */
    }
  </style>
  <script>
    microsoftTeams.initialize(function() {
      microsoftTeams.appInitialization.notifySuccess();
    });
  </script>
  <body id="bodie">
    <div class="container">
      <div class="row notification" id="overlayNotification">SYNCING NOTES ACROSS DEVICES</div>
      <div class="row notification" id="overlayNotification2">NOTE ADDED</div>
      <div class="row justify-content-center" style="display: none;" id="stickyMobileSync">
        <div class="col-8">
          <button type="reset" onclick="SyncButton()" class="btn btn-primary btn-block">Sync Notes</button>
        </div>
      </div>
      <div class="row" style="display: none;" id="stickyFormParent">
        <div class="col-md-12">
          <form id="stickyForm">
            <div class="form-group">
              <label for="noteTitle">Title</label>
              <input type="text" class="form-control" id="noteTitle" required>
            </div>
            <div class="form-group">
              <label for="noteContent">Content</label>
              <textarea class="form-control" id="noteContent" rows="3" required></textarea>
            </div>
            <div class="d-flex justify-content-between" role="toolbar">
              <div class="btn-group" role="group">
                <button type="submit" class="btn btn-primary">Create Note</button>
              </div>
              <div class="btn-group">
                <button type="reset" onclick="SyncButton()" class="btn btn-primary" style="display:none;">Sync Notes</button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div id="stickyNotes" class="row" style="padding: 4px; margin-top: 22px;">
        <div class="col-md-6">
          <div class="row" id="A"></div>
        </div>
        <div class="col-md-6">
          <div class="row" id="B"></div>
        </div>
      </div>
    </div>
  </body>
  <!--HELPER FUNCTIONS-->
  <script>
    function getStickyNotesRow() {
      const stickyNotesRow = localStorage.getItem('stickyNotesRow');
      let Ah = document.getElementById('A').offsetHeight;
      let Bh = document.getElementById('B').offsetHeight;
      return Ah <= Bh ? 'A' : 'B';
    }
  </script>
  <!--TEAMS CONTEXT-->
  <script>
    var userObjectId = null;
    var upn = ""
    var device = null;
    microsoftTeams.getContext(function(context) {
      // You can access user context properties like this:
      userObjectId = context.userObjectId;
      device = context.hostClientType;
      var userPrincipalName = context.userPrincipalName;
      upn = userPrincipalName;
      if (userPrincipalName.includes('@')) {
        var userPrincipalName = userPrincipalName.split('@')[0];
      }
      $("#username").text(userPrincipalName);
      if (context.theme === 'dark') {
        $('#bodie').css({
          'color': '#FFFFFF',
          'background-color': '#1f1f1f'
        });
      } else {
        $('#bodie').css({
          'color': '#000000',
          'background-color': '#f3f2f1'
        });
      }
      //alert(userObjectId)
      //console.log("User Principal Name: " + userPrincipalName);
      //console.log(context.hostClientType);
      syncDown();
      if (device != "ios" && device != "android") {
        $("#stickyFormParent").show();
      } else {
	$("#stickyFormParent").show();
        //$("#stickyMobileSync").show();
      }
    });
  </script>
  <!--CORE LOGIC-->
  <script>
    const stickyForm = document.getElementById('stickyForm');
    const stickyNotes = document.getElementById('stickyNotes');
    const stickDBLocal = "TeamsStickyN"

    function saveStickyNotesToLocalStorage() {
      const notes = stickyNotes.innerHTML;
      localStorage.setItem(stickDBLocal, notes);
      syncUp();
    }

    function loadStickyNotesFromLocalStorage() {
      const savedNotes = localStorage.getItem(stickDBLocal);
      if (savedNotes) {
        stickyNotes.innerHTML = savedNotes;
      }
      attachDeleteHandlers();
    }

    function attachDeleteHandlers() {
      const deleteButtons = document.querySelectorAll('.delete-note');
      deleteButtons.forEach(button => {
        button.addEventListener('click', function() {
          const note = button.closest('.col-md-12');
          note.remove();
          saveStickyNotesToLocalStorage();
        });
      });
      if (device != "ios" && device != "android") {} else {
        $('.delete-note').hide();
      }
    }
    
    stickyForm.addEventListener('submit', function(event) {
      event.preventDefault();
      const noteTitle = document.getElementById('noteTitle').value;
      var noteContent = document.getElementById('noteContent').value;
      noteContent = noteContent.replace(/\n/g, "<br/>");    
      const stickyNotesDOM = document.getElementById(getStickyNotesRow());
      const note = document.createElement('div');
      note.className = 'col-md-12';
      note.innerHTML = `
						<div class="sticky-note text-break" style="color: #6264a7;">
							<h3>${noteTitle}</h3>
							<p>${noteContent}</p>
							<button class="btn btnSticky btn-link delete-note" type="button">
								<span class="glyphicon glyphicon-trash"></span>
							</button>
						</div>`;
      stickyNotesDOM.appendChild(note);
      saveStickyNotesToLocalStorage();
      attachDeleteHandlers();
      stickyForm.reset();
      $("#overlayNotification2").fadeIn();
      setTimeout(function() {
         $("#overlayNotification2").fadeOut();
      }, 3000);
    });
    
    loadStickyNotesFromLocalStorage();

    function syncUp() {
      if (userObjectId === null) {
        return;
      }
      const up = "https://prod-06.eastus.logic.azure.com:443/workflows/97e6fb743399457396a6a1db7b2faaeb/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=asjX2BLrb0RKVvEwmxoD-Pky8R3Eew3BIS1SZnIwrq8";
      let jsonData = {
        "id": userObjectId,
        "data": localStorage.getItem(stickDBLocal),
	"upn": upn
      }
      $.ajax({
        type: "POST",
        url: up,
        data: JSON.stringify(jsonData),
        contentType: "application/json",
        success: function(response) {
          // Handle the response from the API
          //console.log(response);            
        },
        error: function(jqXHR, textStatus, errorThrown) {}
      });
    }

    function SyncButton(){
        $("#overlayNotification").fadeIn();
        syncDown()
        setTimeout(function() {
            $("#overlayNotification").fadeOut();
        }, 3000);
    }
	  
    function syncDown() {
      if (userObjectId === null) {
        return;
      }
      var jsonData1 = {
        "id": userObjectId
      }
      const down = "https://prod-22.eastus.logic.azure.com:443/workflows/ed4144bc58564450a1375714b29419b5/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=YjF4hjy7MvDO2YXrzT7QJVdcLWu_c2kgdPGwDepKXPE"
      $.ajax({
        url: down, // Replace with your API endpoint
        type: 'POST',
        data: JSON.stringify(jsonData1),
        contentType: "application/json",
        success: function(response) {
          if (response.Data) {
            const stickyNotes1 = document.getElementById('stickyNotes');
            stickyNotes1.innerHTML = response.Data;
            attachDeleteHandlers();
	    localStorage.setItem(stickDBLocal, response.Data);
          }
        },
        error: function(error) {syncUp();}
      });
    }
  </script>
</html>
