function getSharePointToken(callback) {
      var tokenEndpoint = "https://accounts.accesscontrol.windows.net/86ba4f67-d4b7-4aed-a496-580c86ac8a67/tokens/OAuth/2";
      
      // Request parameters
      var requestData = {
        grant_type: "client_credentials",
        client_id: clientId,
        client_secret: clientSecret,
        resource: siteUrl
      };

      // Make a POST request to obtain the SharePoint token
      $.ajax({
        url: tokenEndpoint,
        method: "POST",
        data: requestData,
        success: function(response) {
          var accessToken = response.access_token;
          callback(accessToken);
        },
        error: function(error) {
          console.log("Error obtaining SharePoint token: " + error);
        }
      });
    }
